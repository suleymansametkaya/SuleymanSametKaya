<svg width="1200" height="430" viewBox="0 0 1200 430" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Süleyman Samet Kaya engineering HUD</title>
  <desc id="desc">Animated dark heads-up display with a glowing arc reactor and computer vision telemetry.</desc>
  <defs>
    <radialGradient id="reactorCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(254 215) rotate(90) scale(95)">
      <stop stop-color="#E8FFF4"/>
      <stop offset="0.18" stop-color="#0FF181"/>
      <stop offset="0.55" stop-color="#08A65B" stop-opacity="0.68"/>
      <stop offset="1" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelGlow" x1="40" y1="30" x2="1160" y2="400" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FF181" stop-opacity="0.16"/>
      <stop offset="0.46" stop-color="#0A0A0B" stop-opacity="0"/>
      <stop offset="1" stop-color="#E21D2D" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0FF181" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0FF181" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#0FF181" stop-opacity="0"/>
    </linearGradient>
    <filter id="greenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.026"/>
    </pattern>
    <clipPath id="frameClip"><rect x="1" y="1" width="1198" height="428" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="1200" height="430" rx="22" fill="#0A0A0B"/>
    <rect width="1200" height="430" fill="url(#grid)"/>
    <rect width="1200" height="430" fill="url(#panelGlow)"/>
    <circle cx="254" cy="215" r="150" fill="#0FF181" fill-opacity="0.055" filter="url(#softGlow)">
      <animate attributeName="fill-opacity" values="0.035;0.09;0.035" dur="3s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(254 215)">
      <circle r="108" stroke="#FFFFFF" stroke-opacity="0.08"/>
      <circle r="97" stroke="#0FF181" stroke-opacity="0.24" stroke-width="2" stroke-dasharray="3 9">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle r="82" stroke="#0FF181" stroke-width="2" stroke-dasharray="34 10 5 10" filter="url(#greenGlow)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle r="64" stroke="#E9B949" stroke-opacity="0.64" stroke-width="2" stroke-dasharray="7 12">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </circle>
      <path d="M0-55 47.6-27.5V27.5L0 55-47.6 27.5V-27.5Z" stroke="#0FF181" stroke-width="3" filter="url(#greenGlow)"/>
      <path d="M0-42 36.4-21V21L0 42-36.4 21V-21Z" fill="url(#reactorCore)" stroke="#E8FFF4" stroke-opacity="0.8"/>
      <circle r="23" fill="#E8FFF4" fill-opacity="0.9" filter="url(#greenGlow)">
        <animate attributeName="r" values="21;25;21" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.75;1;0.75" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle r="116" stroke="#0FF181" stroke-opacity="0.35">
        <animate attributeName="r" values="108;135" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.45;0" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g stroke="#0FF181" stroke-width="2">
      <path d="M40 84V40H84"/>
      <path d="M1116 40H1160V84"/>
      <path d="M40 346V390H84"/>
      <path d="M1116 390H1160V346"/>
    </g>

    <g font-family="'Courier New', monospace" fill="#0FF181">
      <text x="40" y="24" font-size="10" letter-spacing="4">SSK // INTELLIGENCE INTERFACE</text>
      <text x="953" y="24" font-size="10" letter-spacing="3">MARK SSK-26</text>
      <text x="40" y="414" font-size="9" letter-spacing="2" fill-opacity="0.55">CV NODE 41.0082N // 28.9784E // SYSTEM NOMINAL</text>
      <text x="940" y="414" font-size="9" letter-spacing="2" fill-opacity="0.55">SIGNAL LOCKED</text>
    </g>

    <g transform="translate(420 96)">
      <text x="0" y="0" fill="#0FF181" font-family="'Courier New', monospace" font-size="13" font-weight="700" letter-spacing="5">COMPUTER ENGINEER // ONLINE</text>
      <text x="0" y="68" fill="#F4F4F5" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" letter-spacing="-2">SÜLEYMAN SAMET</text>
      <text x="0" y="126" fill="#F4F4F5" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800" letter-spacing="-2">KAYA</text>
      <rect x="0" y="153" width="650" height="1" fill="#FFFFFF" fill-opacity="0.12"/>
      <text x="0" y="190" fill="#A1A1AA" font-family="'Courier New', monospace" font-size="14" letter-spacing="2">COMPUTER VISION  ·  AI/ML  ·  AUTONOMOUS SYSTEMS</text>
      <g transform="translate(0 226)" font-family="'Courier New', monospace" font-size="11">
        <rect width="154" height="34" rx="17" fill="#0FF181" fill-opacity="0.09" stroke="#0FF181" stroke-opacity="0.38"/>
        <circle cx="20" cy="17" r="4" fill="#0FF181" filter="url(#greenGlow)">
          <animate attributeName="opacity" values="1;0.25;1" dur="1.6s" repeatCount="indefinite"/>
        </circle>
        <text x="34" y="21" fill="#0FF181" letter-spacing="1.5">VISION READY</text>
        <rect x="170" width="154" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.12"/>
        <text x="190" y="21" fill="#D4D4D8" letter-spacing="1.5">UAV LINKED</text>
        <rect x="340" width="174" height="34" rx="17" fill="#FFFFFF" fill-opacity="0.035" stroke="#FFFFFF" stroke-opacity="0.12"/>
        <text x="360" y="21" fill="#D4D4D8" letter-spacing="1.5">FIELD TESTED</text>
      </g>
    </g>

    <rect x="0" y="-8" width="1200" height="16" fill="url(#scan)" opacity="0.7">
      <animate attributeName="y" values="-12;430" dur="5s" repeatCount="indefinite"/>
    </rect>
    <g opacity="0.22">
      <path d="M0 120H1200M0 260H1200" stroke="#FFFFFF" stroke-dasharray="2 12"/>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="428" rx="21" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
</svg>
