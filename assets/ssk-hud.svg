<svg width="1200" height="340" viewBox="0 0 1200 340" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Süleyman Samet Kaya</title>
  <desc id="desc">Animated dark heads-up display with a glowing arc reactor and the name Süleyman Samet Kaya.</desc>
  <defs>
    <radialGradient id="reactorCore" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(220 170) rotate(90) scale(82)">
      <stop stop-color="#F1FFF8"/>
      <stop offset="0.2" stop-color="#0FF181"/>
      <stop offset="0.58" stop-color="#08A65B" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#0A0A0B" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panelGlow" x1="30" y1="20" x2="1170" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0FF181" stop-opacity="0.15"/>
      <stop offset="0.46" stop-color="#0A0A0B" stop-opacity="0"/>
      <stop offset="1" stop-color="#E21D2D" stop-opacity="0.09"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#0FF181" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#0FF181" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#0FF181" stop-opacity="0"/>
    </linearGradient>
    <filter id="greenGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.025"/>
    </pattern>
    <clipPath id="frameClip"><rect x="1" y="1" width="1198" height="338" rx="22"/></clipPath>
  </defs>

  <g clip-path="url(#frameClip)">
    <rect width="1200" height="340" rx="22" fill="#0A0A0B"/>
    <rect width="1200" height="340" fill="url(#grid)"/>
    <rect width="1200" height="340" fill="url(#panelGlow)"/>

    <circle cx="220" cy="170" r="132" fill="#0FF181" fill-opacity="0.05" filter="url(#softGlow)">
      <animate attributeName="fill-opacity" values="0.03;0.085;0.03" dur="3s" repeatCount="indefinite"/>
    </circle>

    <g transform="translate(220 170)">
      <circle r="96" stroke="#FFFFFF" stroke-opacity="0.07"/>
      <circle r="87" stroke="#0FF181" stroke-opacity="0.25" stroke-width="2" stroke-dasharray="3 9">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="18s" repeatCount="indefinite"/>
      </circle>
      <circle r="73" stroke="#0FF181" stroke-width="2" stroke-dasharray="30 10 5 10" filter="url(#greenGlow)">
        <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="9s" repeatCount="indefinite"/>
      </circle>
      <circle r="57" stroke="#E9B949" stroke-opacity="0.62" stroke-width="2" stroke-dasharray="7 12">
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="12s" repeatCount="indefinite"/>
      </circle>
      <path d="M0-49 42.4-24.5V24.5L0 49-42.4 24.5V-24.5Z" stroke="#0FF181" stroke-width="3" filter="url(#greenGlow)"/>
      <path d="M0-37 32-18.5V18.5L0 37-32 18.5V-18.5Z" fill="url(#reactorCore)" stroke="#E8FFF4" stroke-opacity="0.8"/>
      <circle r="20" fill="#E8FFF4" fill-opacity="0.9" filter="url(#greenGlow)">
        <animate attributeName="r" values="18;22;18" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0.72;1;0.72" dur="2.4s" repeatCount="indefinite"/>
      </circle>
      <circle r="102" stroke="#0FF181" stroke-opacity="0.35">
        <animate attributeName="r" values="96;122" dur="2.4s" repeatCount="indefinite"/>
        <animate attributeName="stroke-opacity" values="0.42;0" dur="2.4s" repeatCount="indefinite"/>
      </circle>
    </g>

    <g stroke="#0FF181" stroke-width="2">
      <path d="M38 76V38H76"/>
      <path d="M1124 38H1162V76"/>
      <path d="M38 264V302H76"/>
      <path d="M1124 302H1162V264"/>
    </g>

    <g font-family="'Courier New', monospace" fill="#0FF181">
      <text x="38" y="24" font-size="10" letter-spacing="4">SSK // INTELLIGENCE INTERFACE</text>
      <text x="1018" y="24" font-size="10" letter-spacing="3">MARK SSK</text>
    </g>

    <g transform="translate(370 188)">
      <text x="0" y="0" textLength="760" lengthAdjust="spacingAndGlyphs" fill="#F4F4F5" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="800">SÜLEYMAN SAMET KAYA</text>
      <rect x="2" y="31" width="758" height="2" fill="#0FF181" fill-opacity="0.5">
        <animate attributeName="width" values="0;758;758" dur="2.8s" repeatCount="indefinite"/>
        <animate attributeName="fill-opacity" values="0;0.65;0.2" dur="2.8s" repeatCount="indefinite"/>
      </rect>
    </g>

    <rect x="0" y="-8" width="1200" height="16" fill="url(#scan)" opacity="0.65">
      <animate attributeName="y" values="-12;340" dur="5s" repeatCount="indefinite"/>
    </rect>
    <g opacity="0.18">
      <path d="M0 106H1200M0 234H1200" stroke="#FFFFFF" stroke-dasharray="2 12"/>
    </g>
  </g>
  <rect x="1" y="1" width="1198" height="338" rx="21" stroke="#FFFFFF" stroke-opacity="0.1" stroke-width="2"/>
</svg>
